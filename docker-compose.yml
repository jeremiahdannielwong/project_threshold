services:
  db:
    image: postgres:16-alpine
    container_name: threshold-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-threshold}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - threshold_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-threshold}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: threshold-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      THRESHOLD_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-threshold}
      THRESHOLD_CORS_ORIGINS: ${THRESHOLD_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      THRESHOLD_MLFLOW_TRACKING_URI: http://mlflow:5000
      THRESHOLD_PREFECT_API_URL: http://prefect:4200/api
      # Pass through optional API keys if present in host env / .env file.
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # No pipeline/data bind mount — the backend reads the ontology from Postgres.
    # To run the pipeline against the dockerized DB, run on the host with
    # THRESHOLD_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/threshold,
    # or `docker compose exec backend python -m app.pipeline` (uses an ephemeral cache).

  # One-shot pipeline runner. Populates the Postgres DB from source data files.
  # Run manually: docker compose run --rm pipeline
  # Must be run at least once before the backend serves real data.
  pipeline:
    build:
      context: .
      dockerfile: backend/Dockerfile.pipeline
    container_name: threshold-pipeline
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      THRESHOLD_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-threshold}
      THRESHOLD_DATA_DIR: /pipeline/data
      THRESHOLD_MLFLOW_TRACKING_URI: http://mlflow:5000
      THRESHOLD_PREFECT_API_URL: http://prefect:4200/api
      MLFLOW_TRACKING_INSECURE_TLS: "true"
    volumes:
      - ./pipeline/data:/pipeline/data

  # Orchestration UI + API. The pipeline registers @flow runs here so the team
  # can see DAG, retries, and per-task logs at http://localhost:${PREFECT_PORT:-4800}.
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: threshold-prefect
    restart: unless-stopped
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    environment:
      PREFECT_UI_API_URL: http://localhost:${PREFECT_PORT:-4800}/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_DATABASE_CONNECTION_URL: sqlite+aiosqlite:////data/prefect.db
    ports:
      - "${PREFECT_PORT:-4800}:4200"
    volumes:
      - threshold_prefect:/data

  # MLflow tracking server. Models + metrics from `stages/train.py` land here;
  # the UI at http://localhost:5001 shows experiment history.
  # Port 5001 is used because macOS AirPlay occupies 5000.
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: threshold-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    volumes:
      - threshold_mlflow:/mlflow

volumes:
  threshold_pgdata:
  threshold_prefect:
  threshold_mlflow:
